name: Release

on:
  push:
    branches: [master]
    paths:
      - 'src/DotnetTinyRun/DotnetTinyRun.csproj'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/DotnetTinyRun/DotnetTinyRun.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          OLD_VERSION=$(git show HEAD~1:src/DotnetTinyRun/DotnetTinyRun.csproj 2>/dev/null | grep -oP '(?<=<Version>)[^<]+' || echo "")
          if [ "$VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $OLD_VERSION -> $VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $VERSION"
          fi

  publish-nuget:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack NuGet tool
        run: dotnet pack src/DotnetTinyRun -c Release -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg

  create-release:
    needs: [check-version, publish-nuget]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create tag
        run: git tag v${{ needs.check-version.outputs.version }} && git push origin v${{ needs.check-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            ./artifacts/*
